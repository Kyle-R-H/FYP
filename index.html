<!DOCTYPE html>
<html>

<head>
    <title>FYP Project 22343261</title>
    <link rel="icon" href="data:,"> <!-- Hides Favicon Errors -->
    <link rel="stylesheet" href="light_theme.css">
</head>

<body>
    <h1 style="margin-block-start: 0; margin-block-end: .5em;">
        Real-time Interactive Music Score Tracking Using Live Microphone Input
    </h1>
    <hr />

    <div id="hList">
        <!--^ Upload Score and Temp Audio -->
        <div id="scoreAudioInputs">
            <h3>Score Input</h3>
            <input title="Score Input" id="scoreInput" type="file"
                accept=".musicxml, .mxl, .pdf, .png, .jpeg, .mid, .midi" />

            <!-- TODO: Add audio input file types -->
            <!-- <input title="Audio Input" id="audioInput" type="file" accept=".wav, .mp4" /> -->
        </div>

        <div id="scoreButtons">
            <h3>Score Control</h3>
            <!-- <button id="showHide">show/hide</button> -->
            <button id="reset">Reset</button>
            <button id="prev">Prev</button>
            <button id="next">Next</button>
        </div>

        <div id="audioButtons">
            <h3>Audio</h3>
            <button id="audioListen" style="background-color: maroon; color: white;" hidden>Listen</button>
            <button id="audioStart">Start</button>
            <button id="audioStop">Stop</button>
            <!-- <button id="start">Start</button> -->
        </div>
    </div>

    <hr>

    <div id="hList">
        <div id="timeDomainDiv">
            <h3>Time Domain (Amplitude/Time)</h3>
            <canvas id="timeDomainGraph" width="250" height="100" style="border: 1px solid #000000;"></canvas>
        </div>
        <div id="info">
        </div>

    </div>

    <hr>

    <div id="hList">
        <div id="frequencyDomainDiv">
            <h3>Frequency Domain (Amplitude/Freq)</h3>
            <canvas id="frequencyDomainGraph" width="250" height="100" style="border: 1px solid #000000;"></canvas>
        </div>
    </div>

    <hr />
    <h3 style="margin-block-end: 5px;">Signal Data</h3>
    <div id="hList1">
        <div>
            <p style="font-weight: bolder;">Exp Note</p>
            <p id="signalData1">Test</p>
        </div>
        <div>
            <p style="font-weight: bolder;">Cents</p>
            <p id="signalData2">Test</p>
        </div>
        <div>
            <p style="font-weight: bolder;">Peak Hz</p>
            <p id="signalData2">Test</p>
        </div>
        <div>
            <p style="font-weight: bolder;">Peak Amp</p>
            <p id="signalData2">Test</p>
        </div>
        <div>
            <p style="font-weight: bolder;">Min Amp</p>
            <p id="signalData2">Test</p>
        </div>
    </div>

    <hr />
    <div id="hList" style="align-items: center;">
        <h3>OpenSheetMusicDisplay Score View</h3>
        <button id="zoomp" type="button">+</button>
        <button id="zoomm" type="button">-</button>
        <p id="zoomValue"></p>
    </div>
    <!-- Double div to remove overhang on the right side of the screen -->
    <div id="OSMDContainer">
        <div id="OSMD"></div>
    </div>



    <!-- OpenSheetMusicDisplay Online import as I couldnt get the offline to work using npm nor manual import -->
    <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay/build/opensheetmusicdisplay.min.js"></script>

    <!-- Display the OSMD score -->
    <script type="module" src="/osmd.js"></script>

    <!-- Audio Control -->
    <script src="https://cdn.jsdelivr.net/npm/meyda/dist/web/meyda.min.js"></script>
    <script type="module" src="/audio.js"></script>
</body>

</html>
